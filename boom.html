<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="boom.css">
</head>
<body>
    <div class="kaboom">
    <h1>Order/delivery tracking</h1>
    <h6>place your order</h6>
    

    
    <form class="form">
        <h3>Personal Information</h3>

        <div class="input-box">
            <label for="name">Name *</label>
            <input
                id="name"
                type="text"
                placeholder="Your Name"
                required>
        </div>

        <div class="input-box">
            <label for="phone">Contact Number *</label>
            <input
                id="phone"
                type="tel"
                placeholder="+213 ..."
                required>
        </div>

        <div class="input-box">
            <label for="email">Email *</label>
            <input
                id="email"
                type="email"
                placeholder="example@gmail.com"
                required>
        </div>

        <h3>Order Information</h3>

        <div class="input-box">
            <label for="order-id">Order ID</label>
            <input
                id="order-id"
                type="text"
                placeholder="ORD-12345"
                required>
        </div>
        <select class="form-control form-control-sm">
        <option>alger center</option>
        <option>oran</option>
        <option>bejaya</option>
        <option>So9 ahras/option>
        <option>JELFAتعاضدية</option>
        </select>
        <div class="input-box">
            <label for="delivery">deliver destanation</label>
            <input
                id="order-id"
                type="text"
                placeholder="adress">
        </div>
         <div class="input-B">
            <label for="order-id">postal/zip CODE</label>
            <input
                id="order-id"
                type="text"
                placeholder=""
                required>
                
        </div>
        

        <button type="submit">Track Order</button>
    </form>
    </div>

    <script src="boom.js"></script>
</body>
</html>
